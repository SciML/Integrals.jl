name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    strategy:
      matrix:
        group:
          - Core
        julia-version: ['1.10']
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "${{ matrix.julia-version }}"
      group: "${{ matrix.group }}"
      skip: "Pkg,TOML"
      projects: "."
      allow-reresolve: false
    secrets: "inherit"
